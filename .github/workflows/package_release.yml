name: Release

on:
  workflow_dispatch:

jobs:
  package:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        file:
          - { path: cat/cat.rl, name: cat }
          - { path: ls/ls.rl, name: ls }
          - { path: echo/echo.rl, name: echo }
          - { path: head/head.rl, name: head }
          - { path: tail/tail.rl, name: tail }
          - { path: grep/grep.rl, name: grep }
          - { path: wc/wc.rl, name: wc }
          - { path: mv/mv.rl, name: mv }
          - { path: rm/rm.rl, name: rm }
          - { path: cp/cp.rl, name: cp }
          - { path: rlsh/main.rl, name: rlsh }

    runs-on: ${{ matrix.os }}
    steps:
      - uses: rl-lang/rl-package@main
        with:
          file: ${{ matrix.file.path }}
          output: ${{ matrix.file.name }}

  release:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_number }}
          name: Release ${{ github.run_number }}
          files: artifacts/**/*
